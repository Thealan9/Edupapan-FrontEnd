<div class="alert-wrapper">

  <div class="icon-circle animate-bounce-in" [ngClass]="type">
    <ion-icon [name]="icon"></ion-icon>
  </div>

  <div class="text-center mb-6">
    <span style="display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #94a3b8; margin-bottom: 4px;">
      Sistema Edumex
    </span>
    <p style="margin: 0; color: #334155; font-weight: 700; font-size: 15px; line-height: 1.4; padding: 0 10px;">
      {{ message }}
    </p>
  </div>

  <button class="alert-btn" (click)="close()">
    Aceptar
  </button>
</div>
