<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
      <div class="header-info">
        <h1>Gestion de <span>Paquetes</span></h1>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="--background: #f8fafc;">

  <div *ngIf="loading" class="flex flex-col items-center justify-center h-64 w-full">
    <ion-spinner name="lines-sharp" color="primary"></ion-spinner>
    <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest font-bold animate-pulse">Cargando</p>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 p-1">

    <div *ngFor="let p of packages" class="data-card group">
      <div class="flex justify-between items-start mb-4">
        <div>
          <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Lote</span>
          <h2 class="text-lg font-black text-slate-800 tracking-tighter">{{ p.batch_number }}</h2>
        </div>
        <div [class]="'status-badge ' + p.status">
          {{ p.status }}
        </div>
      </div>

      <div class="space-y-3">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-slate-100 rounded-lg group-hover:bg-blue-50 transition-colors">
            <ion-icon name="book-outline" class="text-slate-500 group-hover:text-blue-600"></ion-icon>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[10px] text-slate-400 uppercase font-bold">Libro</p>
            <p class="text-sm font-semibold text-slate-700 truncate">{{ p.book.title }}</p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="data-field">
            <p class="label">Cantidad</p>
            <p class="value">{{ p.book_quantity }} uts.</p>
          </div>
          <div class="data-field">
            <p class="label">Pallet</p>
            <p class="value">#{{ p.pallet.pallet_code }}</p>
          </div>
        </div>
      </div>

      <div class="mt-6 pt-4 border-t border-slate-100 flex justify-end">
        <button (click)="openEdit(p.id)" class="action-btn-edit">
          <ion-icon name="create-outline"></ion-icon>
          <span>Gestionar</span>
        </button>
      </div>
    </div>

  </div>
</ion-content>
