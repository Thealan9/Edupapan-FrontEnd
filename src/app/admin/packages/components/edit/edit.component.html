<ion-header class="ion-no-border">
  <ion-toolbar class="modal-toolbar">
    <ion-title class="modal-title">
      Gestionar <span>Paquete #{{ packageId }}</span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()" class="close-btn">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div *ngIf="loading" class="flex flex-col items-center justify-center h-full w-full p-8">
    <ion-spinner name="lines-sharp" color="primary"></ion-spinner>
    <p class="text-slate-400 text-xs mt-4 uppercase tracking-widest font-bold animate-pulse">Cargando...</p>
  </div>

  <div class="p-6 md:p-8" *ngIf="!loading">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">

      <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm space-y-5">

        <div class="form-group">
          <label class="form-label">Identificador de Lote</label>
          <div class="input-wrapper">
            <ion-icon name="pricetag-outline" class="input-icon"></ion-icon>
            <ion-input formControlName="batch_number" placeholder="Ej: AA-01" class="custom-input"></ion-input>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contenido (Libro)</label>
          <div class="input-wrapper">
            <ion-icon name="book-outline" class="input-icon"></ion-icon>
            <ion-select formControlName="book_id" placeholder="Seleccione un título" interface="popover" class="custom-select" toggleIcon="chevron-down-outline">
              <ion-select-option *ngFor="let book of books" [value]="book.id">
                {{ book.title }}
              </ion-select-option>
            </ion-select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="form-group">
            <label class="form-label">Ubicación (Pallet)</label>
            <div class="input-wrapper">
              <ion-icon name="layers-outline" class="input-icon"></ion-icon>
              <ion-select formControlName="pallet_id" placeholder="Asignar Pallet" class="custom-select" toggleIcon="chevron-down-outline">
                <ion-select-option *ngFor="let pallet of pallets" [value]="pallet.id">
                  {{ pallet.pallet_code }} ({{ pallet.remaining_capacity }} libres)
                </ion-select-option>
              </ion-select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Cantidad de Unidades</label>
            <div class="input-wrapper">
              <ion-icon name="apps-outline" class="input-icon"></ion-icon>
              <ion-input type="number" formControlName="book_quantity" class="custom-input" placeholder="0"></ion-input>
            </div>
          </div>
        </div>

      </div>

      <button class="submit-modal-btn group" type="submit" [disabled]="form.invalid">
        <span>Actualizar Paquete</span>
        <ion-icon name="sync-outline" class="group-hover:rotate-180 transition-transform duration-500"></ion-icon>
      </button>

    </form>
  </div>
</ion-content>
