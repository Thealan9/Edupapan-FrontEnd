<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
      <div class="header-info">
        <h1>Mi <span>Perfil</span></h1>
      </div>

      <button (click)="openEdit()" class="add-book-btn">
        <ion-icon name="create-outline"></ion-icon>
        <span>Editar Perfil</span>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false">
  <div class="max-w-5xl mx-auto p-6 md:p-8">

    <div *ngIf="!user" class="flex flex-col items-center justify-center h-64">
      <ion-spinner name="lines-sharp" color="primary"></ion-spinner>
      <p class="text-slate-400 text-xs mt-4 uppercase tracking-widest font-bold">Cargando perfil...</p>
    </div>

    <div *ngIf="user" class="space-y-8">

      <div class="profile-container bg-white rounded-3xl border border-slate-100 shadow-xl overflow-hidden">

        <div class="h-40 bg-slate-900 relative">
          <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#4f46e5 1px, transparent 1px); background-size: 20px 20px;"></div>
        </div>

        <div class="p-8 relative">

          <div class="relative -mt-24 mb-6 z-20 inline-block">
            <div class="w-28 h-28 bg-white rounded-2xl shadow-2xl p-1.5">
              <div class="w-full h-full bg-slate-100 rounded-xl flex items-end justify-center overflow-hidden">
                <ion-icon name="person" class="text-7xl text-slate-300 mb-[-5px]"></ion-icon>
              </div>
            </div>
          </div>

          <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div>
              <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tighter">
                {{ user.name }} {{ user.last_name }}
              </h2>
              <p class="text-slate-400 font-bold text-xs uppercase tracking-[0.2em] mt-1">Miembro del equipo Edumex</p>
            </div>
          </div>

          <hr class="my-10 border-slate-100">

          <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">

            <div class="md:col-span-2 space-y-8">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="data-field">
                  <p class="label">Correo Electrónico</p>
                  <div class="flex items-center gap-3 mt-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <ion-icon name="mail-outline" class="text-blue-500 text-xl"></ion-icon>
                    <p class="text-slate-700 font-bold">{{ user.email }}</p>
                  </div>
                </div>

                <div class="data-field">
                  <p class="label">Puesto / Rol</p>
                  <div class="flex items-center gap-3 mt-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <ion-icon name="shield-checkmark-outline" class="text-indigo-500 text-xl"></ion-icon>
                    <p class="text-slate-700 font-bold capitalize">{{ user.role }}</p>
                  </div>
                </div>
              </div>

              <div class="data-field">
                <p class="label">Nivel de Acceso</p>
                <div class="mt-4 flex flex-wrap gap-2">
                  <span class="px-3 py-1 bg-blue-600 text-white text-[10px] font-black rounded-lg uppercase">Lectura</span>
                  <span class="px-3 py-1 bg-blue-600 text-white text-[10px] font-black rounded-lg uppercase">Escritura</span>
                  <span *ngIf="user.role === 'admin'" class="px-3 py-1 bg-indigo-600 text-white text-[10px] font-black rounded-lg uppercase">Gestión Total</span>
                </div>
              </div>
            </div>

            <div class="bg-slate-900 rounded-2xl p-6 text-white flex flex-col justify-center shadow-inner">
               <div class="flex items-center gap-3 mb-4 opacity-60">
                <ion-icon name="lock-closed-outline"></ion-icon>
                <span class="text-[9px] font-black uppercase tracking-widest">Seguridad</span>
              </div>
              <p class="text-[11px] text-slate-400 mb-6 leading-relaxed">
                Mantén tu cuenta protegida actualizando tu contraseña regularmente.
              </p>
              <button (click)="openChangePassword()" class="w-full py-3 bg-white/10 hover:bg-white/20 active:scale-95 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                Cambiar Contraseña
              </button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</ion-content>
