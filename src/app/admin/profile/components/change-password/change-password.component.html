<ion-header class="ion-no-border">
  <ion-toolbar class="modal-toolbar">
    <ion-title class="modal-title">Seguridad <span>Contraseña</span></ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()" class="close-btn">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div class="p-6">
    <div *ngIf="loading && !isSubmitting" class="flex flex-col items-center justify-center p-12">
      <ion-spinner name="lines-sharp" color="primary"></ion-spinner>
    </div>

    <form [formGroup]="form" *ngIf="!loading || isSubmitting" class="space-y-6">

      <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm space-y-5">

        <div class="flex items-center gap-3 p-4 bg-amber-50 rounded-xl border border-amber-100 mb-2">
          <ion-icon name="shield-half-outline" class="text-amber-500 text-xl"></ion-icon>
          <p class="text-[11px] text-amber-700 font-bold uppercase leading-tight">
            Las contraseñas debe tener al menos 8 caracteres.
          </p>
        </div>

        <div class="form-group">
          <label class="form-label">Nueva Contraseña</label>
          <div class="input-wrapper" [class.error]="form.get('password')?.invalid && form.get('password')?.touched">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <ion-input type="password" formControlName="password" placeholder="••••••••" class="custom-input"></ion-input>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirmar Contraseña</label>
          <div class="input-wrapper" [class.error]="form.hasError('passwordMismatch') && form.get('confirmPassword')?.touched">
            <ion-icon name="checkmark-circle-outline" class="input-icon"></ion-icon>
            <ion-input type="password" formControlName="confirmPassword" placeholder="••••••••" class="custom-input"></ion-input>
          </div>
          <p *ngIf="form.hasError('passwordMismatch') && form.get('confirmPassword')?.touched"
             class="text-[10px] text-red-500 font-bold mt-2 uppercase tracking-tighter">
            Las contraseñas no coinciden
          </p>
        </div>

      </div>

      <button (click)="save()"
              [disabled]="form.invalid || isSubmitting"
              class="submit-modal-btn group">
        <span *ngIf="!isSubmitting">Actualizar Contraseña</span>
        <span *ngIf="isSubmitting" class="flex items-center gap-2">
          <ion-spinner name="crescent" class="w-4 h-4"></ion-spinner>
          Procesando...
        </span>
        <ion-icon *ngIf="!isSubmitting" name="key-outline" class="group-hover:rotate-12 transition-transform"></ion-icon>
      </button>

    </form>
  </div>
</ion-content>
