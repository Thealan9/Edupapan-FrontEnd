<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
      <div class="header-info">
        <h1>Gestion de <span>Libros</span></h1>
      </div>

      <button (click)="openCreate()" class="add-book-btn">
        <ion-icon name="add-outline"></ion-icon>
        <span>Añadir nuevo libro</span>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false">
  <div *ngIf="loading" class="flex flex-col items-center justify-center h-64 w-full">
    <ion-spinner name="lines-sharp" color="primary"></ion-spinner>
    <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest font-bold animate-pulse">Cargando</p>
  </div>

  <div *ngIf="!loading" class="max-w-6xl mx-auto p-4 space-y-4">

    <div *ngFor="let b of books" class="book-row group">
      <div class="book-spine" [style.background-color]="b.level === 'A1' ? '#3b82f6' : '#64748b'"></div>

      <div class="flex-1 grid grid-cols-1 md:grid-cols-12 items-center gap-6 p-6">

        <div class="md:col-span-4">
          <h2 class="text-xl font-semibold text-slate-800 group-hover:text-blue-700 transition-colors uppercase leading-tight">
            {{ b.title }}
          </h2>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-bold uppercase">{{ b.level }}</span>
            <span class="text-[11px] text-slate-400 font-medium">ISBN: {{ b.isbn }}</span>
          </div>
        </div>

        <div class="md:col-span-5 border-l border-slate-100 pl-6 grid grid-cols-2 gap-y-4">
          <div class="data-field">
            <p class="label">Proveedor</p>
            <p class="text-slate-700 font-medium">{{ b.supplier }}</p>
          </div>
          <div class="data-field">
            <p class="label">Precio Unitario</p>
            <p class="text-blue-800 font-bold text-lg">{{ b.price | currency }}</p>
          </div>
        </div>

        <div class="md:col-span-3 flex justify-end gap-2">
          <button (click)="openEdit(b)" class="book-action-btn edit" title="Editar ficha">
            <ion-icon name="pencil-outline"></ion-icon>
          </button>
          <button (click)="delete(b.id)" class="book-action-btn delete" title="Eliminar del catálogo">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
      </div>
    </div>

  </div>
</ion-content>
