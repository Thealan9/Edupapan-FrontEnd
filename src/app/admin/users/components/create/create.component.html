<ion-header class="ion-no-border">
  <ion-toolbar class="modal-toolbar">
    <ion-title class="modal-title">
      Registrar <span>Usuario</span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()" class="close-btn">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div class="p-6 md:p-8">
    <form [formGroup]="form" class="space-y-6">

      <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm space-y-5">

        <div class="form-group">
          <label class="form-label">Nombre Completo</label>
          <div class="input-wrapper">
            <ion-icon name="person-outline" class="input-icon"></ion-icon>
            <ion-input formControlName="name" placeholder="Ej: Juan Pérez" class="custom-input"></ion-input>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <ion-input type="email" formControlName="email" placeholder="usuario@edumex.com" class="custom-input"></ion-input>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña de Acceso</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <ion-input type="password" formControlName="password" placeholder="••••••••" class="custom-input"></ion-input>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2">

  <div class="form-group flex flex-col">
    <label class="form-label">Rol de Usuario</label>
    <div class="input-wrapper min-h-[52px] flex items-center">
      <ion-icon name="shield-checkmark-outline" class="input-icon"></ion-icon>
      <ion-select formControlName="role" interface="popover" toggleIcon="chevron-down-outline" class="custom-select">
        <ion-select-option value="user">Usuario</ion-select-option>
        <ion-select-option value="admin">Administrador</ion-select-option>
        <ion-select-option value="warehouseman">Almacenista</ion-select-option>
      </ion-select>
    </div>
  </div>

  <div class="form-group flex flex-col">
    <label class="form-label">Estado de la Cuenta</label>
    <div class="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-xl px-4 min-h-[52px] transition-all duration-300"
         [class.border-green-200]="form.get('active')?.value"
         [class.bg-green-50]="form.get('active')?.value">
      <div class="flex items-center gap-3">
        <ion-icon name="power-outline"
                  [class]="form.get('active')?.value ? 'text-green-500 scale-110' : 'text-slate-400'"
                  class="transition-all duration-300"></ion-icon>
        <span class="text-[10px] font-black uppercase tracking-widest"
              [class]="form.get('active')?.value ? 'text-green-700' : 'text-slate-500'">
          {{ form.get('active')?.value ? 'Cuenta Activa' : 'Desactivada' }}
        </span>
      </div>
      <ion-toggle formControlName="active" mode="ios" color="success"></ion-toggle>
    </div>
  </div>

      </div>
      </div>

      <button
        class="submit-modal-btn group"
        [disabled]="form.invalid || loading"
        (click)="save()">
        <span>Crear Nuevo Usuario</span>
        <ion-icon name="person-add-outline" class="group-hover:scale-110 transition-transform"></ion-icon>
      </button>

    </form>
  </div>
</ion-content>
