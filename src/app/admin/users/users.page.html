<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
  <div class="header-info">
    <h1>Gestión de <span>Usuarios</span></h1>
    <p>Administración de accesos y permisos</p>
  </div>

  <button routerLink="/admin/users/create" class="add-book-btn">
    <ion-icon name="person-add-outline"></ion-icon>
    <span>Nuevo Usuario</span>
  </button>
</div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false">

  <div *ngIf="loading" class="flex flex-col items-center justify-center h-64 w-full">
    <ion-spinner name="lines-sharp" color="primary"></ion-spinner>
    <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest font-bold animate-pulse">Cargando</p>
  </div>

  <div *ngIf="!loading" class="max-w-6xl mx-auto p-4 space-y-4">

    <div *ngFor="let user of users" class="book-row group">
      <div class="book-spine"
           [class.bg-green-500]="user.active"
           [class.bg-red-500]="!user.active">
      </div>

      <div class="flex-1 grid grid-cols-1 md:grid-cols-12 items-center gap-6 p-6">

        <div class="md:col-span-5 flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center border-2 border-slate-200 text-slate-400 group-hover:border-blue-300 group-hover:text-blue-500 transition-all">
            <ion-icon name="person" class="text-2xl"></ion-icon>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-lg font-bold text-slate-800 truncate uppercase tracking-tight leading-none">
              {{ user.name }}
            </h2>
            <p class="text-sm text-slate-500 truncate mt-1">{{ user.email }}</p>
          </div>
        </div>

        <div class="md:col-span-2">
          <div [class]="user.active ? 'status-badge available' : 'status-badge vacio'">
            {{ user.active ? 'Activo' : 'Bloqueado' }}
          </div>
        </div>

        <div class="md:col-span-5 flex justify-end gap-2">
          <button [disabled]="!canEdit(user)"
                  [routerLink]="['/admin/users/edit', user.id]"
                  class="book-action-btn edit" title="Editar usuario">
            <ion-icon name="pencil-outline"></ion-icon>
          </button>

          <button [disabled]="!canEdit(user)"
                  (click)="toggleActive(user)"
                  class="book-action-btn"
                  [ngClass]="user.active ? 'lock-btn' : 'unlock-btn'"
                  [title]="user.active ? 'Bloquear acceso' : 'Habilitar acceso'">
            <ion-icon [name]="user.active ? 'lock-closed-outline' : 'lock-open-outline'"></ion-icon>
          </button>

          <button [disabled]="!canEdit(user)"
                  (click)="delete(user)"
                  class="book-action-btn delete" title="Eliminar permanentemente">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
      </div>
    </div>

  </div>
</ion-content>
