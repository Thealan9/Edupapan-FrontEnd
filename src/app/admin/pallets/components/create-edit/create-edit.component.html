<ion-header class="ion-no-border">
  <ion-toolbar class="modal-toolbar">
    <ion-title class="modal-title">
      {{ isEdit ? 'Editar' : 'Nuevo' }} <span>Pallet</span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()" class="close-btn">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="form-content">
  <div class="p-6 md:p-8">
    <form [formGroup]="form" class="space-y-6">

      <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm space-y-5">

        <div class="form-group">
          <label class="form-label">Código Identificador</label>
          <div class="input-wrapper">
            <ion-icon name="qr-code-outline" class="input-icon"></ion-icon>
            <ion-input type="text" formControlName="pallet_code" placeholder="Ej: PLT-2024-001" class="custom-input"></ion-input>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Ubicación Técnica (Rack/Fila)</label>
          <div class="input-wrapper">
            <ion-icon name="location-outline" class="input-icon"></ion-icon>
            <ion-input type="text" formControlName="warehouse_location" placeholder="Ej: Pasillo A - Estante 3" class="custom-input"></ion-input>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Capacidad Máxima (Paquetes)</label>
          <div class="input-wrapper">
            <ion-icon name="layers-outline" class="input-icon"></ion-icon>
            <ion-input type="number" formControlName="max_packages_capacity" placeholder="Cantidad de bultos permitidos" class="custom-input"></ion-input>
          </div>
          <p class="text-[10px] text-slate-400 mt-2 ml-1 italic">* Define el límite de paquetes que este pallet puede soportar físicamente.</p>
        </div>

      </div>

      <button class="submit-modal-btn group" (click)="submit()">
        <span>{{ isEdit ? 'Actualizar Registro' : 'Registrar Pallet' }}</span>
        <ion-icon name="save-outline" class="group-hover:scale-110 transition-transform"></ion-icon>
      </button>

    </form>
  </div>
</ion-content>
