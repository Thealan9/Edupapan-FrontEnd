<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
      <div class="header-info flex items-center gap-4">
        <button routerLink="/warehouseman" class="add-book-btn !bg-slate-100 !text-slate-600 shadow-none hover:!bg-slate-200">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </button>
        <div>
          <h1><span>Ticket de </span>Venta</h1>
          <p class="text-slate-500 text-sm mt-1">Validación de paquetes para despacho</p>
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="max-w-5xl mx-auto p-6 md:p-8 min-h-full flex flex-col">

    <div class="flex-grow">

      <div *ngIf="loading" class="flex flex-col items-center justify-center h-64 w-full">
        <ion-spinner name="lines-sharp"></ion-spinner>
        <p class="text-slate-400 text-xs mt-4 uppercase tracking-widest font-bold animate-pulse">Sincronizando inventario...</p>
      </div>

      <div *ngIf="!loading && !error">

        <div class="flex items-center justify-between mb-6 px-2">
          <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Paquetes</h3>
          <span class="text-[10px] bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-black uppercase">
            {{ ticketInfo?.details?.length || 0 }}
          </span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div *ngFor="let item of ticketInfo?.details" class="data-card group">

            <div class="flex justify-between items-start mb-4">
              <div>
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Identificador de Lote</p>
                <h2 class="text-lg font-black text-slate-800 tracking-tighter">
                  {{ item.package.batch_number }}
                </h2>
              </div>
              <div [class]="'status-badge ' + item.status">
                {{ item.status }}
              </div>
            </div>

            <div class="space-y-3">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-slate-50 rounded-lg border border-slate-100">
                  <ion-icon name="cube-outline" class="text-slate-400"></ion-icon>
                </div>
                <div class="data-field">
                  <p class="label">Estado del Producto</p>
                  <p class="value font-bold text-slate-600 capitalize">{{ item.status }}</p>
                </div>
              </div>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-50 flex justify-end"
                 *ngIf="ticketInfo.status == 'in_progress' && item.status == 'pending'">
              <button (click)="opendetailPackageStatus(item.id)" class="action-btn-edit">
                <ion-icon name="options-outline"></ion-icon>
                <span>Gestionar</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-10 pb-6 space-y-3" *ngIf="!loading && !error">

      <button *ngIf="ticketInfo.status == 'approve_partially' || ticketInfo.status == 'refused_partially'"
              (click)="confirmPartial()"
              class="submit-modal-btn !bg-amber-500 shadow-amber-500/20">
        <ion-icon name="partly-sunny-outline"></ion-icon>
        <span>Completar Salida Parcial</span>
      </button>

      <button *ngIf="ticketInfo.status == 'in_progress'"
              (click)="confirm()"
              class="submit-modal-btn btn-approve">
        <ion-icon name="checkmark-done-outline"></ion-icon>
        <span>Finalizar</span>
      </button>
    </div>

    <div *ngIf="!loading && error" class="flex flex-col items-center justify-center h-64 bg-white rounded-3xl border border-dashed border-slate-200">
      <ion-icon name="alert-circle-outline" class="text-4xl text-red-400 mb-2"></ion-icon>
      <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">Error al cargar la venta</p>
    </div>

  </div>

  <ion-action-sheet
    [isOpen]="isDeatilPackageStatus"
    header="GESTIÓN DE SALIDA"
    cssClass="edumex-action-sheet"
    [buttons]="actionSheetButtons"
    (didDismiss)="isDeatilPackageStatus = false"
  ></ion-action-sheet>

  <ion-alert
    [isOpen]="addDescriptionPackageStatus"
    [header]="addDescriptionHeader"
    [subHeader]="addDescriptionSubheader"
    cssClass="edumex-alert"
    [inputs]="alertInputs"
    [buttons]="actionAddDescriptionPackageStatusButtons"
    (didDismiss)="addDescriptionPackageStatus = false"
  ></ion-alert>

  <ion-alert
    [isOpen]="isAlertOpen"
    [header]="alertHeader"
    [message]="alertMessage"
    cssClass="edumex-alert"
    [buttons]="alertButtons"
    (didDismiss)="isAlertOpen = false"
  ></ion-alert>

</ion-content>
