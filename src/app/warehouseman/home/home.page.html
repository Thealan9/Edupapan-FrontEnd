<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
      <div class="header-info">
        <h1><span>Tickets</span></h1>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Gestión de Tickets de Almacén</p>
      </div>

      <div class="flex gap-2 justify-end ">

        <button (click)="logout()" class="add-book-btn !bg-red-50 !text-red-600 shadow-none">
          <ion-icon name="log-out-outline"></ion-icon>
          <span>Salir</span>
        </button>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false">
  <div class="max-w-7xl mx-auto p-6 md:p-8">

    <div *ngIf="loading" class="flex flex-col items-center justify-center h-64 w-full">
      <ion-spinner name="lines-sharp" color="primary"></ion-spinner>
      <p class="text-slate-400 text-xs mt-4 uppercase tracking-widest font-bold animate-pulse">Sincronizando tickets...</p>
    </div>

    <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

      <div *ngFor="let t of tickets" class="data-card group">

        <div class="flex justify-between items-start mb-6">
          <div class="flex items-center gap-3">
            <div>
              <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ticket #{{ t.id }}</span>
              <h2 class="text-lg font-black text-slate-800 tracking-tighter capitalize">{{ t.type }}</h2>
            </div>
          </div>
          <div [class]="'status-badge ' + t.status">
            {{ t.status.replace('_', ' ') }}
          </div>
        </div>

        <div class="space-y-4">
          <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
             <div class="flex flex-col">
                <p class="text-[10px] text-slate-400 uppercase font-black tracking-tight leading-none">Cajas Totales</p>
                <p class="text-xl font-black text-slate-700 mt-1">{{ t.quantity }} <span class="text-xs text-slate-400 font-bold">uds</span></p>
             </div>
             <ion-icon name="cube-outline" class="text-2xl text-slate-300"></ion-icon>
          </div>

          <div class="flex items-center gap-2">
            <ion-icon name="calendar-clear-outline" class="text-slate-400"></ion-icon>
            <p class="text-[11px] text-slate-500 font-bold uppercase tracking-tighter">Emitido: {{ t.created_at | date:'shortDate' }}</p>
          </div>
        </div>

        <div class="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between">
          <div class="flex -space-x-2">
          </div>

          <div class="flex gap-2">
            <button *ngIf="t.status == 'pending'" (click)="acceptTicket(t.id)" class="action-btn-success">
              <ion-icon name="checkmark-circle-outline"></ion-icon>
              <span>Aceptar</span>
            </button>

            <button *ngIf="t.status != 'pending' && t.status != 'pending_partially_completed'"
                    [routerLink]="['/warehouseman/ticket/', t.type, t.id]"
                    class="action-btn-edit">
              <ion-icon name="eye-outline"></ion-icon>
              <span>Ver Detalles</span>
            </button>
          </div>
        </div>

      </div>

    </div>
  </div>
</ion-content>
